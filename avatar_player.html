<!DOCTYPE html>
<html>
<head>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body{
    margin:0;
    background:#111;
    text-align:center;
}

model-viewer{
    width:100%;
    height:500px;
}

button{
    padding:10px 20px;
    font-size:16px;
}
</style>

</head>

<body>

<model-viewer
    id="avatar"
    src="https://models.readyplayer.me/69afd8304d98c768210a760b.glb"
    camera-controls
    autoplay
    auto-rotate>
</model-viewer>

<br>

<audio id="speech" controls>
    <source src="audiobook.mp3" type="audio/mpeg">
</audio>

<br>

<button onclick="startSpeaking()">▶ Speak</button>

<script>

function startSpeaking(){

    let audio = document.getElementById("speech");

    audio.play();

}

</script>

</body>
</html>
